<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Admin | Clientes')}"></head>
<body class="admin-shell text-slate-900">
<aside th:replace="~{admin/fragments/layout :: sidebar('clientes')}"></aside>
<header th:replace="~{admin/fragments/layout :: mobilebar('clientes')}"></header>
<main class="p-4 sm:p-6 lg:ml-64 lg:p-8">
	<div th:replace="~{admin/fragments/layout :: topbar('Clientes', 'Datos guardados por DNI para compras web y ventas manuales.')}"></div>

	<div class="mb-6 flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
		<div th:if="${mensaje}" class="rounded-lg bg-green-50 px-4 py-3 text-sm font-bold text-green-800" th:text="${mensaje}">Mensaje</div>
		<a th:href="@{/admin/clientes/nuevo}" class="inline-flex items-center justify-center gap-2 rounded-xl bg-secondary px-4 py-3 text-sm font-bold text-white hover:opacity-90">
			<span class="material-symbols-outlined">person_add</span> Nuevo cliente
		</a>
	</div>

	<section class="admin-card overflow-hidden rounded-2xl">
		<div class="overflow-x-auto">
			<table class="w-full min-w-[980px] text-left text-sm">
				<thead class="bg-surface-soft text-xs uppercase text-muted">
					<tr>
						<th class="px-6 py-4">DNI</th>
						<th class="px-6 py-4">Nombre</th>
						<th class="px-6 py-4">Email</th>
						<th class="px-6 py-4">Teléfono</th>
						<th class="px-6 py-4 text-right">Acciones</th>
					</tr>
				</thead>
				<tbody class="divide-y divide-outline">
					<tr th:if="${#lists.isEmpty(clientes)}">
						<td colspan="5" class="p-10 text-center text-muted">Aun no hay clientes guardados.</td>
					</tr>
					<tr th:each="cliente : ${clientes}" class="hover:bg-surface-soft">
						<td class="px-6 py-5 font-black text-primary" th:text="${cliente.dniCuit ?: '-'}">DNI</td>
						<td class="px-6 py-5">
							<p class="font-black" th:text="${cliente.nombre ?: 'Sin nombre'}">Nombre</p>
							<p class="text-xs font-semibold text-muted" th:text="${cliente.apellidoRazonSocial ?: ''}">Apellido</p>
						</td>
						<td class="px-6 py-5" th:text="${cliente.email ?: '-'}">Email</td>
						<td class="px-6 py-5" th:text="${cliente.telefono ?: '-'}">Teléfono</td>
						<td class="px-6 py-5">
							<div class="flex justify-end gap-2">
								<button type="button" th:data-open-modal="|cliente-detalle-${cliente.id}|" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-outline text-primary hover:bg-white" title="Ver cliente">
									<span class="material-symbols-outlined text-[20px]">visibility</span>
								</button>
								<a th:href="@{/admin/clientes/{id}/editar(id=${cliente.id})}" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-outline text-primary hover:bg-white" title="Editar cliente">
									<span class="material-symbols-outlined text-[20px]">edit</span>
								</a>
								<button type="button" th:data-open-modal="|cliente-eliminar-${cliente.id}|" class="inline-flex h-9 w-9 items-center justify-center rounded-lg border border-red-200 text-red-700 hover:bg-red-50" title="Eliminar cliente">
									<span class="material-symbols-outlined text-[20px]">delete</span>
								</button>
							</div>

							<dialog th:id="|cliente-detalle-${cliente.id}|" class="w-full max-w-lg rounded-2xl border border-outline p-0 shadow-xl backdrop:bg-slate-900/40">
								<div class="p-6">
									<div class="flex items-start justify-between gap-4">
										<div>
											<p class="text-xs font-black uppercase text-muted">Cliente</p>
											<h2 class="mt-1 text-2xl font-black text-primary" th:text="|${cliente.nombre ?: 'Sin nombre'} ${cliente.apellidoRazonSocial ?: ''}|">Cliente</h2>
										</div>
										<button type="button" data-close-modal class="inline-flex h-9 w-9 items-center justify-center rounded-lg text-muted hover:bg-surface-soft" title="Cerrar">
											<span class="material-symbols-outlined">close</span>
										</button>
									</div>
									<dl class="mt-5 grid gap-3 text-sm">
										<div class="rounded-lg bg-surface-soft p-3">
											<dt class="text-xs font-black uppercase text-muted">DNI / CUIT</dt>
											<dd class="mt-1 font-bold text-primary" th:text="${cliente.dniCuit ?: '-'}">DNI</dd>
										</div>
										<div class="rounded-lg bg-surface-soft p-3">
											<dt class="text-xs font-black uppercase text-muted">Email</dt>
											<dd class="mt-1 font-bold text-primary" th:text="${cliente.email ?: '-'}">Email</dd>
										</div>
										<div class="rounded-lg bg-surface-soft p-3">
											<dt class="text-xs font-black uppercase text-muted">Teléfono</dt>
											<dd class="mt-1 font-bold text-primary" th:text="${cliente.telefono ?: '-'}">Teléfono</dd>
										</div>
									</dl>
									<div class="mt-6 flex justify-end gap-3 border-t border-outline pt-5">
										<a th:href="@{/admin/clientes/{id}/editar(id=${cliente.id})}" class="rounded-xl bg-secondary px-5 py-3 text-sm font-black text-white hover:opacity-90">Editar</a>
									</div>
								</div>
							</dialog>

							<dialog th:id="|cliente-eliminar-${cliente.id}|" class="w-full max-w-md rounded-2xl border border-outline p-0 shadow-xl backdrop:bg-slate-900/40">
								<form th:action="@{/admin/clientes/{id}/eliminar(id=${cliente.id})}" method="post" class="p-6">
									<div class="flex items-start gap-4">
										<div class="flex h-11 w-11 shrink-0 items-center justify-center rounded-full bg-red-50 text-red-700">
											<span class="material-symbols-outlined">warning</span>
										</div>
										<div>
											<h2 class="text-xl font-black text-primary">Eliminar cliente</h2>
											<p class="mt-2 text-sm text-muted">
												Vas a eliminar a <strong th:text="|${cliente.nombre ?: 'Sin nombre'} ${cliente.apellidoRazonSocial ?: ''}|">este cliente</strong>.
											</p>
										</div>
									</div>
									<div class="mt-6 flex justify-end gap-3 border-t border-outline pt-5">
										<button type="button" data-close-modal class="rounded-xl border border-outline px-5 py-3 text-sm font-bold text-primary hover:bg-surface-soft">Cancelar</button>
										<button class="rounded-xl bg-red-700 px-5 py-3 text-sm font-black text-white hover:bg-red-800">Eliminar</button>
									</div>
								</form>
							</dialog>
						</td>
					</tr>
				</tbody>
			</table>
		</div>
	</section>
</main>
<script>
	document.addEventListener("click", (event) => {
		const openButton = event.target.closest("[data-open-modal]");
		if (openButton) {
			const dialog = document.getElementById(openButton.dataset.openModal);
			if (dialog) dialog.showModal();
			return;
		}
		const closeButton = event.target.closest("[data-close-modal]");
		if (closeButton) {
			closeButton.closest("dialog")?.close();
		}
	});
</script>
</body>
</html>
