<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title th:text="${title}">Admin | ElectrodentalNea</title>
	<link rel="icon" type="image/png" th:href="@{/img/electrodentallarge.png}">
	<link rel="shortcut icon" type="image/png" th:href="@{/img/electrodentallarge.png}">
	<link rel="apple-touch-icon" th:href="@{/img/electrodentallarge.png}">
	<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
	<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
	<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
	<script>
		tailwind.config = {
			theme: {
				extend: {
					colors: {
						primary: "#000d1b",
						"primary-container": "#0b2438",
						secondary: "#b71f2a",
						"secondary-container": "#ffdad7",
						"on-secondary-container": "#410005",
						background: "#f8f9fb",
						surface: "#ffffff",
						"surface-soft": "#f2f4f6",
						"surface-panel": "#ffffff",
						outline: "#d9dde3",
						muted: "#6b7280"
					},
					spacing: {
						xs: "4px",
						sm: "8px",
						md: "16px",
						lg: "24px",
						xl: "32px",
						xxl: "48px"
					},
					fontFamily: { sans: ["Inter", "sans-serif"] }
				}
			}
		}
	</script>
	<style>
		body { font-family: 'Inter', sans-serif; background: #f8f9fb; }
		.material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
		.admin-shell { min-height: 100vh; }
		.admin-link-active { background: #ffdad7; color: #410005; transform: scale(.98); }
		.admin-card { background: rgba(255,255,255,.92); border: 1px solid #d9dde3; box-shadow: 0 10px 30px rgba(15,23,42,.045); }
	</style>
</head>
<body>
<aside th:fragment="sidebar(active)" class="fixed inset-y-0 left-0 z-40 hidden w-64 flex-col border-r border-outline bg-white p-4 lg:flex">
	<a th:href="@{/admin}" class="mb-6 flex items-center px-4 py-4">
		<img src="/img/electrodentallarge.png" alt="ElectrodentalNea" class="h-14 w-auto object-contain">
	</a>
	<nav class="flex flex-1 flex-col gap-1">
		<a th:href="@{/admin}" th:classappend="${active == 'dashboard'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">dashboard</span> Panel Control
		</a>
		<a th:href="@{/admin/productos}" th:classappend="${active == 'productos'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">inventory_2</span> Productos
		</a>
		<a th:href="@{/admin/categorias}" th:classappend="${active == 'categorias'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">category</span> Categorías
		</a>
		<a th:href="@{/admin/pedidos}" th:classappend="${active == 'pedidos'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">shopping_bag</span> Pedidos
		</a>
		<a th:href="@{/admin/ventas}" th:classappend="${active == 'ventas'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">point_of_sale</span> Ventas
		</a>
		<a th:href="@{/admin/clientes}" th:classappend="${active == 'clientes'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">group</span> Clientes
		</a>
		<a th:href="@{/admin/configuracion}" th:classappend="${active == 'configuracion'} ? ' admin-link-active' : ''" class="flex items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
			<span class="material-symbols-outlined">settings</span> Configuración
		</a>
	</nav>
	<div class="border-t border-outline pt-4">
		<a th:href="@{/admin/productos/nuevo}" class="mb-4 flex w-full items-center justify-center gap-2 rounded-lg bg-primary px-4 py-3 text-sm font-bold text-white hover:opacity-90">
			<span class="material-symbols-outlined">add</span> Nuevo Producto
		</a>
		<a th:href="@{/}" class="flex w-full items-center justify-center gap-2 rounded-lg border border-outline bg-white px-4 py-3 text-sm font-bold text-primary hover:bg-surface-soft">
			<span class="material-symbols-outlined">storefront</span> Volver a la tienda
		</a>
		<form th:action="@{/admin/logout}" method="post" class="mt-2">
			<button class="flex w-full items-center gap-3 rounded-lg px-4 py-3 text-sm font-bold text-slate-600 hover:bg-surface-soft">
				<span class="material-symbols-outlined">logout</span> Cerrar sesión
			</button>
		</form>
	</div>
</aside>

<header th:fragment="mobilebar(active)" class="sticky top-0 z-40 border-b border-outline bg-white/95 px-4 py-3 backdrop-blur lg:hidden">
	<div class="flex items-center justify-between gap-3">
		<a th:href="@{/admin}" class="flex items-center"><img src="/img/electrodentallarge.png" alt="ElectrodentalNea" class="h-12 w-auto"></a>
		<a th:href="@{/admin/productos/nuevo}" class="inline-flex items-center gap-2 rounded-lg bg-primary px-3 py-2 text-sm font-bold text-white">
			<span class="material-symbols-outlined text-[18px]">add</span> Producto
		</a>
	</div>
	<nav class="mt-3 flex gap-2 overflow-x-auto text-xs font-bold">
		<a th:href="@{/admin}" th:classappend="${active == 'dashboard'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Panel</a>
		<a th:href="@{/admin/productos}" th:classappend="${active == 'productos'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Productos</a>
		<a th:href="@{/admin/categorias}" th:classappend="${active == 'categorias'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Categorías</a>
		<a th:href="@{/admin/pedidos}" th:classappend="${active == 'pedidos'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Pedidos</a>
		<a th:href="@{/admin/ventas}" th:classappend="${active == 'ventas'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Ventas</a>
		<a th:href="@{/admin/clientes}" th:classappend="${active == 'clientes'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Clientes</a>
		<a th:href="@{/admin/configuracion}" th:classappend="${active == 'configuracion'} ? ' bg-secondary-container text-on-secondary-container' : ' bg-surface-soft text-slate-600'" class="whitespace-nowrap rounded-full px-3 py-2">Config</a>
	</nav>
</header>

<div th:fragment="topbar(title, subtitle)" class="mb-8 flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
	<div>
		<h1 class="text-3xl font-black text-primary sm:text-4xl" th:text="${title}">Panel</h1>
		<p class="mt-2 text-sm text-muted" th:text="${subtitle}">Resumen</p>
	</div>
	<div class="flex gap-3">
		<label class="relative hidden sm:block">
			<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-muted">search</span>
			<input class="h-11 w-72 rounded-lg border border-outline bg-white pl-10 pr-4 text-sm outline-none focus:ring-2 focus:ring-primary/20" placeholder="Buscar pedido o producto...">
		</label>
		<button class="h-11 rounded-lg bg-white px-3 text-muted shadow-sm ring-1 ring-outline hover:bg-surface-soft">
			<span class="material-symbols-outlined">notifications</span>
		</button>
	</div>
</div>
</body>
</html>
