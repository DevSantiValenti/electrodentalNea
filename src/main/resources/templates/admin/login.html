<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head('Admin | Login')}"></head>
<body class="min-h-screen bg-background text-slate-900">
<main class="flex min-h-screen items-center justify-center p-4">
	<section class="admin-card w-full max-w-md rounded-2xl p-6">
		<div class="mb-6 text-center">
			<img src="/img/electrodentallarge.png" alt="ElectrodentalNea" class="mx-auto h-20 w-auto object-contain">
			<h1 class="mt-4 text-2xl font-black text-primary">Acceso administrador</h1>
			<p class="mt-2 text-sm text-muted">Ingresá para administrar productos, clientes, pedidos y ventas.</p>
		</div>

		<div th:if="${param.error}" class="mb-4 rounded-lg bg-red-50 px-4 py-3 text-sm font-bold text-red-800">
			Usuario o contraseña incorrectos.
		</div>
		<div th:if="${param.logout}" class="mb-4 rounded-lg bg-green-50 px-4 py-3 text-sm font-bold text-green-800">
			Sesión cerrada correctamente.
		</div>

		<form th:action="@{/admin/login}" method="post" class="space-y-4">
			<label class="block">
				<span class="text-sm font-bold text-primary">Usuario</span>
				<input name="username" autocomplete="username" required autofocus class="mt-1 h-11 w-full rounded-lg border-outline" placeholder="admin">
			</label>
			<label class="block">
				<span class="text-sm font-bold text-primary">Contraseña</span>
				<input name="password" type="password" autocomplete="current-password" required class="mt-1 h-11 w-full rounded-lg border-outline" placeholder="Contraseña">
			</label>
			<button class="flex h-12 w-full items-center justify-center gap-2 rounded-xl bg-secondary px-5 font-black text-white hover:opacity-90">
				<span class="material-symbols-outlined">login</span> Ingresar
			</button>
		</form>
		<a th:href="@{/}" class="mt-4 flex h-11 items-center justify-center rounded-xl border border-outline px-5 text-sm font-bold text-primary hover:bg-surface-soft">Volver a tienda</a>
	</section>
</main>
</body>
</html>
