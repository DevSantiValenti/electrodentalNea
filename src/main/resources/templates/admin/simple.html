<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/fragments/layout :: head(${titulo ?: 'Admin'})}"></head>
<body class="admin-shell text-slate-900">
<aside th:replace="~{admin/fragments/layout :: sidebar('configuracion')}"></aside>
<header th:replace="~{admin/fragments/layout :: mobilebar('configuracion')}"></header>
<main class="p-4 sm:p-6 lg:ml-64 lg:p-8">
	<div class="admin-card rounded-2xl p-10 text-center">
		<h1 class="text-3xl font-black text-primary" th:text="${titulo}">Sección</h1>
		<p class="mx-auto mt-3 max-w-2xl text-muted" th:text="${mensaje}">En preparación.</p>
		<a th:href="@{/admin}" class="mt-6 inline-flex rounded-xl bg-primary px-5 py-3 font-bold text-white">Volver al panel</a>
	</div>
</main>
</body>
</html>
