<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/shop :: head('Contacto | ElectrodentalNea')}"></head>
<body class="bg-background font-sans text-slate-900">
<header th:replace="~{fragments/shop :: header}"></header>

<main class="mx-auto max-w-5xl px-4 py-12 sm:px-6 lg:py-16">
	<section class="grid gap-8 lg:grid-cols-[1fr_.9fr] lg:items-start">
		<div>
			<p class="text-sm font-black uppercase tracking-wide text-secondary">Contacto</p>
			<h1 class="mt-3 text-4xl font-black leading-tight text-primary sm:text-5xl">Hablemos de lo que necesita tu consultorio.</h1>
			<p class="mt-4 max-w-2xl text-lg font-semibold text-slate-600">Escribinos para asesoramiento comercial, presupuestos o soporte tecnico.</p>
		</div>

		<div class="rounded-xl border border-outline bg-white p-5 shadow-sm">
			<h2 class="text-xl font-black text-primary">Canales de atención</h2>
			<div class="mt-5 space-y-3">
				<a th:each="correo : ${configuracionTienda.emailList}"
				   th:href="${'mailto:' + correo}"
				   class="flex items-center gap-3 rounded-lg border border-outline px-4 py-3 font-bold text-primary hover:bg-surface-soft">
					<span class="material-symbols-outlined text-secondary">mail</span>
					<span class="min-w-0 break-all" th:text="${correo}">info@electrodentalnea.com</span>
				</a>
				<a th:href="${configuracionTienda.whatsappLink}"
				   target="_blank"
				   rel="noopener"
				   class="flex items-center gap-3 rounded-lg bg-[#25D366] px-4 py-3 font-black text-white hover:brightness-95">
					<span class="material-symbols-outlined">chat</span>
					<span>WhatsApp</span>
				</a>
			</div>
		</div>
	</section>

	<section class="mt-10 overflow-hidden rounded-xl border border-outline bg-white shadow-sm">
		<iframe th:src="${configuracionTienda.mapsEmbedUrl}" title="Mapa ElectrodentalNea" class="h-80 w-full" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
	</section>
</main>

<footer th:replace="~{fragments/shop :: footer}"></footer>
</body>
</html>
