<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Productos</title>
	<link rel="icon" type="image/png" th:href="@{/img/electrodentallarge.png}">
	<link rel="shortcut icon" type="image/png" th:href="@{/img/electrodentallarge.png}">
	<link rel="apple-touch-icon" th:href="@{/img/electrodentallarge.png}">
	<link rel="stylesheet" th:href="@{/css/site.css}">
</head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="section page">
	<p class="eyebrow">Productos</p>
	<h1>Equipos, repuestos e insumos para el trabajo diario.</h1>
	<div class="grid">
		<article class="card">
			<h2>Equipamiento</h2>
			<p>Unidades dentales, compresores, autoclaves y accesorios.</p>
		</article>
		<article class="card">
			<h2>Repuestos</h2>
			<p>Componentes para reparaciones y mantenimiento programado.</p>
		</article>
		<article class="card">
			<h2>Insumos</h2>
			<p>Materiales de uso frecuente para el consultorio odontologico.</p>
		</article>
	</div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
